[package]
name = "fyn-configuration"
version = "0.0.35"
description = "This is an internal component crate of fyn"
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
fyn-auth = { workspace = true }
fyn-cache = { workspace = true }
fyn-cache-info = { workspace = true }
fyn-distribution-types = { workspace = true }
fyn-git = { workspace = true }
fyn-normalize = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-pep508 = { workspace = true, features = ["schemars"] }
fyn-platform-tags = { workspace = true }
fyn-redacted = { workspace = true }
fyn-static = { workspace = true }

clap = { workspace = true, features = ["derive"], optional = true }
either = { workspace = true }
fs-err = { workspace = true }
rayon = { workspace = true }
reqwest = { workspace = true }
rustc-hash = { workspace = true }
same-file = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
tokio = { workspace = true }
serde-untagged = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
insta = { workspace = true }
serde_json = { workspace = true }

[features]
default = []
