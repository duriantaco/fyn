[package]
name = "fyn-build-backend"
version = "0.0.33"
description = "This is an internal component crate of fyn"
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lib]
doctest = false

[dependencies]
fyn-distribution-filename = { workspace = true }
fyn-fs = { workspace = true }
fyn-globfilter = { workspace = true }
fyn-macros = { workspace = true }
fyn-normalize = { workspace = true }
fyn-options-metadata = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-pep508 = { workspace = true }
fyn-platform-tags = { workspace = true }
fyn-preview = { workspace = true }
fyn-pypi-types = { workspace = true }
fyn-warnings = { workspace = true }

base64 = { workspace = true }
csv = { workspace = true }
flate2 = { workspace = true, default-features = false }
fs-err = { workspace = true }
globset = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
rustc-hash = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
spdx = { workspace = true }
tar = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
version-ranges = { workspace = true }
walkdir = { workspace = true }
zip = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-shear]
# Imported by the `OptionsMetadata` derive macro
ignored = ["fyn-options-metadata"]

[features]
schemars = ["dep:schemars", "fyn-pypi-types/schemars"]

[dev-dependencies]
fyn-preview = { workspace = true, features = ["testing"] }

indoc = { workspace = true }
insta = { workspace = true }
regex = { workspace = true }
