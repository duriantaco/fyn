[package]
name = "fyn-workspace"
version = "0.0.33"
description = "This is an internal component crate of fyn"
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
fyn-build-backend = { workspace = true, features = ["schemars"] }
fyn-cache-key = { workspace = true }
fyn-configuration = { workspace = true }
fyn-distribution-types = { workspace = true }
fyn-fs = { workspace = true, features = ["tokio", "schemars"] }
fyn-git-types = { workspace = true }
fyn-macros = { workspace = true }
fyn-normalize = { workspace = true }
fyn-options-metadata = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-pep508 = { workspace = true }
fyn-pypi-types = { workspace = true }
fyn-redacted = { workspace = true }
fyn-static = { workspace = true }
fyn-warnings = { workspace = true }

clap = { workspace = true, optional = true }
fs-err = { workspace = true }
glob = { workspace = true }
ignore = { workspace = true }
itertools = { workspace = true }
owo-colors = { workspace = true }
rustc-hash = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
assert_fs = { workspace = true }
insta = { workspace = true }
regex = { workspace = true }
tempfile = { workspace = true }

[features]
schemars = ["dep:schemars", "fyn-pypi-types/schemars", "fyn-redacted/schemars"]
