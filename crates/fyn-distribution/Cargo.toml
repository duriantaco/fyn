fyn-client = { workspace = true }
fyn-configuration = { workspace = true }
fyn-distribution-filename = { workspace = true }
fyn-distribution-types = { workspace = true }
fyn-extract = { workspace = true }
fyn-flags = { workspace = true }
fyn-fs = { workspace = true, features = ["tokio"] }
fyn-git = { workspace = true }
fyn-git-types = { workspace = true }
fyn-install-wheel = { workspace = true }
fyn-metadata = { workspace = true }
fyn-normalize = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-pep508 = { workspace = true }
fyn-platform-tags = { workspace = true }
fyn-python = { workspace = true }
fyn-pypi-types = { workspace = true }
fyn-redacted = { workspace = true }
fyn-types = { workspace = true }
fyn-warnings = { workspace = true }
fyn-workspace = { workspace = true }

anyhow = { workspace = true }
either = { workspace = true }
fs-err = { workspace = true }
futures = { workspace = true }
nanoid = { workspace = true }
owo-colors = { workspace = true }
reqwest = { workspace = true }
