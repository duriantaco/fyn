tracing = { workspace = true }
url = { workspace = true }
walkdir = { workspace = true }
zip = { workspace = true }

[dev-dependencies]
indoc = { workspace = true }
insta = { workspace = true }

[features]
default = []
static = ["fyn-extract/static"]
