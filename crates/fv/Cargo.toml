[package]
name = "fv"
version = "0.10.12"
description = "A Python package and project manager"
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
documentation = "https://github.com/oha/fv"
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
default-run = "fv"

[lints]
workspace = true

[dependencies]
fv-audit = { workspace = true }
fv-auth = { workspace = true }
fv-bin-install = { workspace = true }
fv-build-backend = { workspace = true }
fv-build-frontend = { workspace = true }
fv-cache = { workspace = true }
fv-cache-info = { workspace = true }
fv-cache-key = { workspace = true }
fv-cli = { workspace = true }
fv-client = { workspace = true }
fv-configuration = { workspace = true }
fv-console = { workspace = true }
fv-dirs = { workspace = true }
fv-dispatch = { workspace = true }
fv-distribution = { workspace = true }
fv-distribution-filename = { workspace = true }
fv-distribution-types = { workspace = true }
fv-extract = { workspace = true }
fv-flags = { workspace = true }
fv-fs = { workspace = true }
fv-git = { workspace = true }
fv-git-types = { workspace = true }
fv-install-wheel = { workspace = true, default-features = false }
fv-installer = { workspace = true }
fv-logging = { workspace = true }
fv-normalize = { workspace = true }
fv-pep440 = { workspace = true }
fv-pep508 = { workspace = true }
fv-performance-memory-allocator = { workspace = true, optional = true }
fv-platform = { workspace = true }
fv-platform-tags = { workspace = true }
fv-preview = { workspace = true }
fv-publish = { workspace = true }
fv-pypi-types = { workspace = true }
fv-python = { workspace = true, features = ["schemars"] }
fv-redacted = { workspace = true }
fv-requirements = { workspace = true }
fv-requirements-txt = { workspace = true }
fv-resolver = { workspace = true }
fv-scripts = { workspace = true }
fv-settings = { workspace = true, features = ["schemars"] }
fv-shell = { workspace = true }
fv-static = { workspace = true }
fv-test = { workspace = true, optional = true }
fv-tool = { workspace = true }
fv-torch = { workspace = true }
fv-trampoline-builder = { workspace = true }
fv-types = { workspace = true }
fv-version = { workspace = true }
fv-virtualenv = { workspace = true }
fv-warnings = { workspace = true }
fv-workspace = { workspace = true, features = ["clap"] }

anstream = { workspace = true }
anyhow = { workspace = true }
axoupdater = { workspace = true, features = [
    "github_releases",
    "tokio",
], optional = true }
clap = { workspace = true, features = ["derive", "string", "wrap_help"] }
console = { workspace = true }
ctrlc = { workspace = true }
diskus = { workspace = true }
dotenvy = { workspace = true }
dunce = { workspace = true }
fs-err = { workspace = true, features = ["tokio"] }
futures = { workspace = true }
http = { workspace = true }
jiff = { workspace = true }
indexmap = { workspace = true }
indicatif = { workspace = true }
indoc = { workspace = true }
itertools = { workspace = true }
miette = { workspace = true, features = ["fancy-no-backtrace"] }
open = { workspace = true }
owo-colors = { workspace = true }
petgraph = { workspace = true }
reqwest = { workspace = true }
rkyv = { workspace = true }
rustc-hash = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
textwrap = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true }
tracing-durations-export = { workspace = true, features = ["plot"], optional = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json", "registry"] }
tracing-tree = { workspace = true }
unicode-width = { workspace = true }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
version-ranges = { workspace = true }
walkdir = { workspace = true }
which = { workspace = true }
zip = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
arrayvec = { workspace = true }
self-replace = { workspace = true }
fv-windows = { workspace = true }
windows = { workspace = true }

[build-dependencies]
fv-static = { workspace = true }
fv-version = { workspace = true }

embed-manifest = { workspace = true }

[dev-dependencies]
fv-publish = { workspace = true, features = ["test"] }
fv-test = { workspace = true }

assert_cmd = { workspace = true }
assert_fs = { workspace = true }
backon = { workspace = true }
base64 = { workspace = true }
byteorder = { workspace = true }
bytes = { workspace = true }
filetime = { workspace = true }
flate2 = { workspace = true, default-features = false }
http-body-util = { workspace = true }
hyper = { workspace = true }
hyper-util = { workspace = true }
indoc = { workspace = true }
insta = { workspace = true }
predicates = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["blocking"], default-features = false }
sha2 = { workspace = true }
tar = { workspace = true }
tempfile = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
whoami = { workspace = true }
wiremock = { workspace = true }
zip = { workspace = true }

[target.'cfg(unix)'.dependencies]
nix = { workspace = true }
fv-unix = { workspace = true }

[features]
default = ["performance", "fv-distribution/static", "test-defaults"]
native-auth = []
# Use better memory allocators, etc.
performance = ["performance-memory-allocator"]
performance-memory-allocator = ["dep:fv-performance-memory-allocator"]

# Adds self-update functionality. This feature is only enabled for fv's cargo-dist installer
# and should be left unselected when building fv for package managers.
self-update = ["axoupdater", "fv-cli/self-update"]

# Features for development only.
tracing-durations-export = ["dep:tracing-durations-export", "fv-resolver/tracing-durations-export", "fv-settings/tracing-durations-export", "fv-test/tracing-durations-export"]

# Features that only apply when running tests, no-ops otherwise.
test-defaults = [
    "test-crates-io",
    "test-git",
    "test-git-lfs",
    "test-pypi",
    "test-r2",
    "test-python",
    "test-python-managed",
    "test-python-eol",
    "test-slow",
    "test-ecosystem"
]
# Introduces a testing dependency on crates.io.
test-crates-io = []
# Introduces a testing dependency on Git.
test-git = ["fv-test?/git"]
# Introduces a testing dependency on Git LFS.
test-git-lfs = ["test-git"]
# Introduces a testing dependency on PyPI.
test-pypi = []
# Introduces a testing dependency on R2.
test-r2 = []
# Introduces a testing dependency on a local Python installation.
test-python = []
# Introduces a testing dependency on a local Python installation with specific patch versions.
test-python-patch = []
# Introduces a testing dependency on a local Python installation with an EOL version.
test-python-eol = []
# Introduces a testing dependency on managed Python installations.
test-python-managed = []
# Include "slow" test cases.
test-slow = []
# Includes test cases that require ecosystem packages
test-ecosystem = []
# Build fvw binary on Windows
windows-gui-bin = []

[package.metadata.cargo-shear]
# The fv crate has fv-test as dev-dependency. We want that by default,
# uv runs tests with `fv-test/git`, so it's a default feature in fv. The
# problem is that fv-test is only a dev dependency, which gets stripped by
# `cargo install`, and `cargo install` fails with a missing crate error.
# As workaround, we make `fv-test` a regular optional dependency. It's never
# used as a regular dependency, but it allows using `fv-test?/git` as default
# feature.
ignored = ["fv-test"]

[package.metadata.dist]
dist = true

[[bin]]
name = "fvw"
required-features = ["windows-gui-bin"]
