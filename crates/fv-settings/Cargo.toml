[package]
name = "fv-settings"
version = "0.0.32"
description = "This is an internal component crate of fv"
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
fv-cache-info = { workspace = true, features = ["schemars"] }
fv-client = { workspace = true }
fv-configuration = { workspace = true, features = ["schemars", "clap"] }
fv-dirs = { workspace = true }
fv-distribution-types = { workspace = true, features = ["schemars"] }
fv-flags = { workspace = true }
fv-fs = { workspace = true }
fv-install-wheel = { workspace = true, features = ["schemars", "clap"] }
fv-macros = { workspace = true }
fv-normalize = { workspace = true, features = ["schemars"] }
fv-options-metadata = { workspace = true }
fv-pep508 = { workspace = true }
fv-pypi-types = { workspace = true }
fv-python = { workspace = true, features = ["schemars", "clap"] }
fv-redacted = { workspace = true }
fv-resolver = { workspace = true, features = ["schemars", "clap"] }
fv-static = { workspace = true }
fv-torch = { workspace = true, features = ["schemars", "clap"] }
fv-warnings = { workspace = true }
fv-workspace = { workspace = true, features = ["schemars", "clap"] }

clap = { workspace = true }
fs-err = { workspace = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true }
textwrap = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["fv-options-metadata", "clap"]

[dev-dependencies]

[features]
tracing-durations-export = []
