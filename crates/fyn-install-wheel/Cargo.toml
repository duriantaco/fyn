[package]
name = "fyn-install-wheel"
version = "0.0.33"
description = "This is an internal component crate of fyn"
keywords = ["wheel", "python"]

edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
license = { workspace = true }

[lints]
workspace = true

[lib]
doctest = false
name = "fyn_install_wheel"

[dependencies]
fyn-distribution-filename = { workspace = true }
fyn-flags = { workspace = true }
fyn-fs = { workspace = true }
fyn-normalize = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-preview = { workspace = true }
fyn-pypi-types = { workspace = true }
fyn-shell = { workspace = true }
fyn-trampoline-builder = { workspace = true }
fyn-warnings = { workspace = true }

configparser = { workspace = true }
csv = { workspace = true }
data-encoding = { workspace = true }
fs-err = { workspace = true }
itertools = { workspace = true }
mailparse = { workspace = true }
owo-colors = { workspace = true }
pathdiff = { workspace = true }
regex = { workspace = true }
rustc-hash = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
walkdir = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
same-file = { workspace = true }
self-replace = { workspace = true }

[features]
clap = ["fyn-fs/clap"]
schemars = ["fyn-fs/schemars"]

[dev-dependencies]
anyhow = { workspace = true }
assert_fs = { workspace = true }
indoc = { workspace = true }
