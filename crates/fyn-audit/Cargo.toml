[package]
name = "fyn-audit"
version = "0.0.35"
description = "This is an internal component crate of fyn"
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
authors.workspace = true
license.workspace = true

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
fyn-configuration = { workspace = true }
fyn-pep440 = { workspace = true }
fyn-normalize = { workspace = true }
fyn-redacted = { workspace = true }
fyn-small-str = { workspace = true }

clap = { workspace = true, optional = true }
futures = { workspace = true }
jiff = { workspace = true }
reqwest-middleware = { workspace = true, features = ["json"] }
rustc-hash = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
reqwest = { workspace = true, default-features = false, features = [
  "rustls-tls",
  "rustls-tls-native-roots",
] }
serde_json = { workspace = true }
tokio = { workspace = true }
wiremock = { workspace = true }

[features]
default = ["test-osv"]

# Introduces a testing dependency on osv.dev.
test-osv = []

[package.metadata.cargo-shear]
# NOTE: reqwest is a dependency of reqwest-middleware, but we don't use it directly.
# However, we *do* need to explicitly declare it as a dev-dependency to ensure
# the right TLS features are enabled. `cargo shear` can't see that, hence the ignore.
ignored = ["reqwest"]
