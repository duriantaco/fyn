# Publish a release to PyPI.
#
# Assumed to run as a subworkflow of .github/workflows/release.yml; specifically, as a publish job
# within `cargo-dist`.
name: "Publish to PyPI"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Release workflow run ID to publish artifacts from.
        required: true
        type: string
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  pypi-publish-fyn:
    name: Upload fyn to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: false
    permissions:
      actions: read
      contents: read
      id-token: write # For PyPI's trusted publishing
    steps:
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        if: ${{ inputs.plan != '' }}
        with:
          pattern: wheels_fyn-*
          path: wheels_fyn
          merge-multiple: true
      - name: Download release artifacts
        if: ${{ inputs.plan == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          mkdir -p wheels_fyn
          artifacts="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("wheels_fyn-")) | .name')"
          if [ -z "$artifacts" ]; then
            echo "No fyn wheel artifacts found for run ${RUN_ID}"
            exit 1
          fi

          printf '%s\n' "$artifacts" | while read -r artifact; do
            gh run download "${RUN_ID}" --repo "${GITHUB_REPOSITORY}" -n "$artifact" -D wheels_fyn
          done
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always -v wheels_fyn/*

  pypi-publish-fyn-build:
    name: Upload fyn-build to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: false
    permissions:
      actions: read
      contents: read
      id-token: write # For PyPI's trusted publishing
    steps:
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        if: ${{ inputs.plan != '' }}
        with:
          pattern: wheels_fyn_build-*
          path: wheels_fyn_build
          merge-multiple: true
      - name: Download release artifacts
        if: ${{ inputs.plan == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          mkdir -p wheels_fyn_build
          artifacts="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("wheels_fyn_build-")) | .name')"
          if [ -z "$artifacts" ]; then
            echo "No fyn-build wheel artifacts found for run ${RUN_ID}"
            exit 1
          fi

          printf '%s\n' "$artifacts" | while read -r artifact; do
            gh run download "${RUN_ID}" --repo "${GITHUB_REPOSITORY}" -n "$artifact" -D wheels_fyn_build
          done
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always -v wheels_fyn_build/*
