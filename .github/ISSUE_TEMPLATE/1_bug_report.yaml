name: Bug report
description: Report an error or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Please review [our guide on interacting with the issue tracker](https://github.com/duriantaco/fyn/issues/9452) before opening a new issue.**

  - type: textarea
    attributes:
      label: Summary
      description: |
        A clear and concise description of the bug, including a minimal reproducible example.
        If we cannot reproduce the bug, it is unlikely that we will be able to help you.

        Please include the full output of fyn with the complete error message.
    validations:
      required: true

  - type: input
    attributes:
      label: Platform
      description: What operating system and architecture are you using? (see `uname -orsm`)
      placeholder: e.g., macOS 14 arm64, Windows 11 x86_64, Ubuntu 20.04 amd64
    validations:
      required: true

  - type: input
    attributes:
      label: Version
      description: What version of fyn are you using? (see `fyn self version`)
      placeholder: e.g., fyn 0.5.20 (1c17662b3 2025-01-15)
    validations:
      required: true

  - type: input
    attributes:
      label: Python version
      description: What version of Python are you using? (see `fyn run python --version`)
      placeholder: e.g., Python 3.12.6
    validations:
      required: false
